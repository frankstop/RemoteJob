name: Update job data

on:
  schedule:
    - cron: "12 5,11,17,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run fetch:jobs
      - name: Commit refreshed dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/jobs.json public/data/sources.json
          git diff --cached --quiet || git commit -m "Update remote job dataset"
          git push

